; gammastep — night light for i3 (X11). Maintained redshift fork.
; Equivalent of: wlsunset -l 41.005 -L 71.794 -T 6500 -t 4000

[general]
; daytime / nighttime colour temperature (Kelvin)
temp-day=6500
temp-night=4000

; force the X11 backend so it never auto-picks wayland on a stale session
adjustment-method=randr

; fixed coordinates (no geoclue needed)
location-provider=manual

[manual]
lat=41.005
lon=71.794
