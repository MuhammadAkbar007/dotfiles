# ~/.config/foot/foot.ini

[main]
term=xterm-256color
font=JetBrainsMono Nerd Font:size=15
pad=10x15
# Foot does not support background opacity natively without a compositor
# Ensure your sway/wayland compositor handles transparency.

[colors]
alpha=0.93
foreground=d0cfcc
background=000000
regular0=171421  # black
regular1=c01c28  # red
regular2=26a270  # green
regular3=a2734c  # yellow
regular4=ffd701  # blue
regular5=a347ba  # magenta
regular6=2aa1b3  # cyan
regular7=d0cfcc  # white

bright0=5e5c64   # bright black
bright1=ed1515   # bright red
bright2=11d116   # bright green
bright3=f67400   # bright yellow
bright4=ffd700   # bright blue
bright5=9b59b6   # bright magenta
bright6=1abc9c   # bright cyan
bright7=ffffff   # bright white

[cursor]
color=171421 ffffff
