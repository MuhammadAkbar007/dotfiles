[colors]
background      = #BF1E1E2E
background-alt   = #313244
foreground      = #cdd6f4
disabled         = #6c7086
accent           = #df8e1d
red              = #f38ba8
green            = #40a02b
mauve            = #cba6f7
blue             = #89b4fa
purple           = #8839ef
yellow           = #f9e2af
overlay          = #acb0be
urgent           = #e64553

[bar/example]
width = 100%
height = 30pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 5pt

padding-left = 1
padding-right = 1
module-margin = 1
separator =
separator-foreground = ${colors.disabled}

; Ubuntu Nerd Font carries both text + icon glyphs.
; <name>;<vertical-offset>
font-0 = Ubuntu Nerd Font:weight=bold:size=13;3
font-1 = Ubuntu Nerd Font:weight=bold:size=15;3
font-2 = Ubuntu Nerd Font:weight=bold:size=12;3
; Color-emoji fallback for the clipboard label. Twemoji Mozilla is a COLR/CPAL
; *vector* color font (copied from firefox-esr), so cairo renders it in full
; color AND scales it to the bar size. Noto Color Emoji couldn't be used: it's a
; fixed bitmap strike that polybar can't scale (rendered huge & clipped).
font-3 = Twemoji Mozilla:size=13;3

modules-left = xworkspaces pomodoro mpris
modules-center = date
modules-right = clipboard network pulseaudio caffeine power systray prayer

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
override-redirect = false

;==========================================================
; Clipboard (cliphist) — last item; click = history, right-click = wipe
;==========================================================
[module/clipboard]
type = custom/script
exec = ~/.config/i3/clipboard/clip-show.sh
interval = 1
format = <label>
format-prefix = "󰅍 "
format-prefix-foreground = ${colors.mauve}
format-foreground = ${colors.disabled}
label = %output%
label-maxlen = 33
label-ellipsis = true
click-left = ~/.config/i3/clipboard/clip-menu.sh
click-right = cliphist wipe

;==========================================================
; Workspaces
;==========================================================
[module/xworkspaces]
type = internal/xworkspaces

; Static per-workspace app icons. The text BEFORE the ';' is matched against
; the workspace name (exact match: "1".."10"), the text AFTER is the glyph.
; All glyphs are Material Design (nf-md-*) so they render in Ubuntu Nerd Font.
; To change a workspace's icon, swap the glyph after its ';'.
icon-0 = 1;
icon-1 = 2;
icon-2 = 3;󱚝
icon-3 = 4;󰉋
icon-4 = 5;󰊠
icon-5 = 6;󰕼
icon-6 = 7;󰕧
icon-7 = 8;
icon-8 = 9;
icon-9 = 10;
icon-default = 󰊠

label-active = %name% %icon%
label-active-foreground = ${colors.accent}
label-active-padding = 2

label-occupied = %name% %icon%
label-occupied-foreground = ${colors.disabled}
label-occupied-padding = 2

label-empty = %icon% %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

label-urgent = %icon% %name%
label-urgent-foreground = ${colors.urgent}
label-urgent-background = ${colors.red}
label-urgent-padding = 2

;==========================================================
; MPRIS now-playing (replaces waybar's `mpris`). Script streams playerctl.
; click = play/pause, scroll = next/prev. No rounded pill (polybar can't do
; per-module border-radius), so it's a plain colored label.
;==========================================================
[module/mpris]
type = custom/script
exec = ~/.config/polybar/mpris.sh
interval = 1
format-padding = 2
format-margin = 9
click-left = playerctl play-pause
scroll-up = playerctl next
scroll-down = playerctl previous

;==========================================================
; Clock / date  (center)  — no interactive calendar in polybar
;==========================================================
[module/date]
type = internal/date
interval = 1

date = "   %d %B | 󰅐 %H:%M"

label = %date%
label-foreground = ${colors.foreground}
format-padding = 1

;==========================================================
; Pulseaudio
;==========================================================
; internal/pulseaudio can't pick an icon from the active *port* (speaker vs
; headphone), so we use a script that watches pactl and swaps the glyph.
[module/pulseaudio]
type = custom/script
exec = ~/.config/polybar/pulseaudio.sh
tail = true
format = <label>
label = %output%

click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-right = pavucontrol
click-middle = blueman-manager
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +2%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -2%

;==========================================================
; Network — wifi signal icon
;==========================================================
[module/network]
type = internal/network
interface-type = wireless
interval = 5

; Click actions are embedded in the format (internal modules don't reliably
; honor the generic click-left). A1 = left -> network applet, A3 = right -> nmtui.
format-connected = | %{A1:/home/akbar/.config/rofi/network/network.sh:}%{A3:kitty -e nmtui:}<ramp-signal> <label-connected>%{A}%{A}
format-connected-foreground = ${colors.purple}
ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨

format-disconnected = %{A1:/home/akbar/.config/rofi/network/network.sh:}%{A3:kitty -e nmtui:}<label-disconnected>%{A}%{A}
format-disconnected-foreground = ${colors.red}
label-disconnected = 󰤮
label-connected = %essid%
label-maxlen = 33
label-connected-foreground = ${colors.purple}

;==========================================================
; Backlight
;==========================================================
[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true

format = <ramp> <label>
format-foreground = ${colors.yellow}
label = %percentage%%
ramp-0 = 󰃞
ramp-1 = 󰃟
ramp-2 = 󰃠

;==========================================================
; Pomodoro (pet project). Bar text + timer are portable; the break OVERLAY is
; Wayland-only (GTK Layer Shell) and is handled separately. The script streams
; pomodoro.py's JSON; clicks drive pomodoroctl.py.
;   click-left = start/pause   click-right = next/break   click-middle = reset
;==========================================================
[module/pomodoro]
type = custom/script
exec = ~/.config/polybar/pomodoro.sh
tail = true
format-padding = 2
format-margin = 9
click-left = python3 /home/akbar/akbarDev/pet-projects/pomodoro/pomodoroctl.py toggle
click-right = python3 /home/akbar/akbarDev/pet-projects/pomodoro/pomodoroctl.py next
click-middle = python3 /home/akbar/akbarDev/pet-projects/pomodoro/pomodoroctl.py reset

;==========================================================
; Caffeine / idle inhibitor
;==========================================================
[module/caffeine]
type = custom/script
exec = ~/.config/polybar/caffeine.sh
interval = 1
click-left = ~/.config/polybar/caffeine.sh toggle

;==========================================================
; Prayer times (namozvaqti) — same data source as the waybar custom/prayer.
; The label is the JSON `.text`; polybar has no tooltip, so click opens the
; full times table in a kitty popup (the waybar `.tooltip` equivalent).
;==========================================================
[module/prayer]
type = custom/script
exec = ~/.config/polybar/prayer.sh
interval = 60
format-foreground = ${colors.accent}
format-padding = 1
click-left = kitty -e ~/.config/polybar/prayer_popup.sh

;==========================================================
; Power menu (rofi) TODO: add icons or firefox bookmark
;==========================================================
[module/power]
type = custom/text
format = ⏻
format-foreground = ${colors.red}
format-padding = 1
click-left = ~/.config/rofi/powermenu/powermenu.sh

;==========================================================
; System tray
;==========================================================
[module/systray]
type = internal/tray
format-margin = 1pt
tray-spacing = 7pt
tray-size = 50%

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
