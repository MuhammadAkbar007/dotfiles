#################################
#            Backend            #
#################################
# glx is required for dual_kawase blur
backend = "glx";
vsync = true;
use-damage = false;   # off: avoids blur smearing/artifacts

#################################
#             Blur             #
#################################
blur-method = "dual_kawase";
blur-strength = 11;
blur-background = true;

# Don't blur behind these (wallpaper, fullscreen, menus, CSD shadows)
blur-background-exclude = [
  "window_type = 'desktop'",
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'tooltip'",
  "class_g = 'feh'",
  "class_g = 'slop'",
  "class_g = 'maim'",
  # Rofi draws its own rounded corners; picom's blur fills the square bounding
  # box and shows as a blurred halo through those corners. Exclude it so the
  # rounded corners stay clean (rofi/launcher + powermenu).
  "class_g = 'Rofi'",
  "_GTK_FRAME_EXTENTS@"
];

#################################
#           Opacity            #
#################################
# Gentle global translucency for the aesthetic: every window is slightly
# see-through and blurred. Kept at 0.93 so text in content apps (browsers)
# stays readable. Terminals get EXTRA background see-through from kitty's own
# background_opacity (0.70) layered on top of this — so the terminal background
# is the most transparent, while its text stays crisp.
active-opacity = 0.93;
inactive-opacity = 0.88;
frame-opacity = 1.0;
detect-client-opacity = true;

# Keep the slop selection overlay fully opaque so the gold outline stays crisp.
opacity-rule = [
  "100:class_g = 'slop'"
];

# Keep these fully opaque / at their own alpha (don't dim the bar, menus, tray)
wintypes:
{
  dock          = { opacity = 1.0; };
  tooltip       = { opacity = 1.0; };
  menu          = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
  popup_menu    = { opacity = 1.0; };
  utility       = { opacity = 1.0; };
  notification  = { opacity = 1.0; };  # let dunst keep its own RGBA alpha
};

#################################
#           Fading             #
#################################
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 8;

#################################
#           General            #
#################################
detect-rounded-corners = true;
detect-transient = true;
detect-client-leader = true;

# vim:ft=conf
