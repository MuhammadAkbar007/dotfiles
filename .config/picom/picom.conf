#################################
#            Backend            #
#################################
# glx is required for dual_kawase blur
backend = "glx";
vsync = true;
use-damage = true;    # on: only redraw changed regions (iGPU near-idle when static)

#################################
#             Blur             #
#################################
# Blur OFF. On picom v12 blur is driven by blur-method, NOT blur-background
# (the latter is a legacy no-op here), so "none" is what actually disables it.
# dual_kawase was the main iGPU cost, and it frosts every *translucent* window
# (e.g. kitty at background_opacity 0.70) — not just solid ones. To restore the
# frosted glass, set blur-method back to "dual_kawase".
blur-method = "dual_kawase";
blur-strength = 15;
blur-background = false;

# Don't blur behind these (wallpaper, fullscreen, menus, CSD shadows)
blur-background-exclude = [
  "window_type = 'desktop'",
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'tooltip'",
  "class_g = 'feh'",
  "class_g = 'slop'",
  "class_g = 'maim'",
  # Rofi draws its own rounded corners; picom's blur fills the square bounding
  # box and shows as a blurred halo through those corners. Exclude it so the
  # rounded corners stay clean (rofi/launcher + powermenu).
  "class_g = 'Rofi'",
  "_GTK_FRAME_EXTENTS@"
];

#################################
#           Opacity            #
#################################
# All windows solid (1.0): no picom-added translucency. The terminal is still
# dark-transparent because kitty draws its own background_opacity (0.70), which
# picom honors via detect-client-opacity — independent of these values. So the
# terminal stays see-through while every other app is solid.
active-opacity = 1.0;
inactive-opacity = 0.85;
frame-opacity = 1.0;
detect-client-opacity = true;

# Keep the slop selection overlay fully opaque so the gold outline stays crisp.
opacity-rule = [
  "100:class_g = 'slop'",
  # i3lock draws a fullscreen override-redirect window that picom treats as
  # unfocused, so inactive-opacity (0.85) let the feh desktop wallpaper bleed
  # through the lock image (looked like blur). Force the locker fully opaque.
  "100:class_g = 'i3lock'",
  # Rofi menus (power menu, launcher, switchers) should be solid; without this,
  # inactive-opacity dims them and the desktop bleeds through. Each rofi theme
  # still controls its own translucency via its background-color alpha.
  "100:class_g = 'Rofi'"
];

# Keep these fully opaque / at their own alpha (don't dim the bar, menus, tray)
wintypes:
{
  dock          = { opacity = 1.0; };
  tooltip       = { opacity = 1.0; };
  menu          = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
  popup_menu    = { opacity = 1.0; };
  utility       = { opacity = 1.0; };
  notification  = { opacity = 1.0; };  # let dunst keep its own RGBA alpha
};

#################################
#           Fading             #
#################################
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 8;

#################################
#           General            #
#################################
detect-rounded-corners = true;
detect-transient = true;
detect-client-leader = true;

# vim:ft=conf
