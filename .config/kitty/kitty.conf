# terminal color
term xterm-256color

# No audible bell. tmux's `monitor-activity on` + `visual-activity off` sends a
# BEL on activity in background windows (e.g. when you switch windows with
# C-M-l), which kitty would otherwise beep for. We keep tmux's status-bar
# activity flash; this just mutes the sound. window_alert_on_bell stays off too.
enable_audio_bell no
window_alert_on_bell no
window_padding_width 5
hide_window_decorations yes
remember_window_size yes
# Terminal makes only the BACKGROUND translucent (text stays opaque); picom
# blurs the wallpaper behind it. Tune to taste. Whole-window opacity is NOT
# done in picom anymore (it made browser text unreadable).
background_opacity 0.80
dynamic_background_opacity yes

font_family      family='JetBrainsMono Nerd Font' postscript_name=JetBrainsMonoNF-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 15
symbol_map U+1F300-U+1F9FF Noto Color Emoji

# Colors
color0  #171421
color1  #C01C28
color2  #26A270
color3  #A2734C
color4  #ffd701
color5  #A347BA
color6  #2AA1B3
color7  #D0CFCC

# Map Home and End keys
map home send_text all \x1b[H
map end send_text all \x1b[F

# The following command checks if tmux is installed.
# If tmux is installed, it automatically attaches to an existing tmux session.
# If no tmux session exists, a new one is created.
# If tmux is not installed, it simply starts zsh without tmux.
# shell zsh --login -ic 'tmux attach-session -t akbar || tmux new-session -s akbar || exec zsh'

